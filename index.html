<script>
    // ======================= SOURCES (7 lexiques) =======================
    const SOURCES = [
        { id: "histoire", nom_tm: "Asnirem n umezruy – H.A.M.", nom_fr: "Terminologie de l'histoire – H.A.M.", urlJson: "data/terminologie_histoire.json", pdfUrl: "https://talajuba.github.io/terminologie-histoire" },
        { id: "inventaire", nom_tm: "Asuṭṭen n yiwalnuten – H.A.M.", nom_fr: "Inventaire des néologismes – H.A.M.", urlJson: "data/inventaire.json", pdfUrl: "https://talajuba.github.io/inventaire-neologismes" },
        { id: "informatique", nom_tm: "Amawal n tsenselkimt – S.S.B.", nom_fr: "Lexique d'informatique – S.S.B.", urlJson: "data/informatique.json", pdfUrl: "https://talajuba.github.io/lexique-informatique" },
        { id: "doctorat_bh", nom_tm: "Tazrawt n Doctorat – B.H.", nom_fr: "Thèse de Doctorat – B.H.", urlJson: "data/doctorathb.json", pdfUrl: "https://talajuba.github.io/doctorat-bhamek" },
        { id: "doctorat_ydj", nom_tm: "Tazrawt n Doctorat – Y.DJ.", nom_fr: "Thèse de Doctorat – Y.DJ.", urlJson: "data/doctoratydj.json", pdfUrl: "https://talajuba.github.io/doctorat-ydjouadi" },
        { id: "verbes", nom_tm: "Taseftit n umyag – K.N.Z.", nom_fr: "Conjugaison des verbes – K.N.Z.", urlJson: "data/verbes.json", pdfUrl: "https://talajuba.github.io/conjugaison-kabyle" },
        { id: "tasnilest", nom_tm: "Amawal n tesnilest – A.B.", nom_fr: "Lexique de linguistique – A.B.", urlJson: "data/tasnilestab.json", pdfUrl: "https://talajuba.github.io/lexique-linguistique" }
    ];

    let masterDictionary = [];
    let currentLang = "tm";
    let currentResults = [];
    let currentSearchTerm = "";

    // ======================= CHARGEMENT JSON =======================
    async function loadSource(source) {
        try {
            const response = await fetch(source.urlJson);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (!Array.isArray(data)) throw new Error("Le JSON n'est pas un tableau");
            const entries = data.map(item => {
                // Gérer french (peut être string ou tableau)
                let frenchText = "";
                if (typeof item.french === 'string') {
                    frenchText = item.french.trim();
                } else if (Array.isArray(item.french) && item.french.length > 0) {
                    // Si c'est un tableau, on joint les éléments avec " ; "
                    frenchText = item.french.join(' ; ').trim();
                } else {
                    frenchText = "";
                }
                
                let tamList = [];
                if (Array.isArray(item.tamazight)) tamList = item.tamazight;
                else if (typeof item.tamazight === 'string') tamList = [item.tamazight];
                else tamList = [];
                tamList = tamList.map(t => t.replace(/\.$/, '').trim());
                
                return {
                    french: frenchText,
                    tamazight: tamList,
                    sourceId: source.id,
                    sourceName_tm: source.nom_tm,
                    sourceName_fr: source.nom_fr,
                    pdfUrl: source.pdfUrl
                };
            }).filter(entry => entry.french !== "" || entry.tamazight.length > 0);
            console.log(`✅ ${source.nom_tm} : ${entries.length} entrées`);
            return entries;
        } catch (err) {
            console.error(`❌ Erreur ${source.nom_tm}:`, err);
            // Utiliser console.warn au lieu de alert pour ne pas bloquer l'utilisateur
            console.warn(`⚠️ ${source.nom_tm} : fichier JSON introuvable ou mal formé.`);
            return [];
        }
    }

    async function loadAllSources() {
        const results = await Promise.all(SOURCES.map(src => loadSource(src)));
        masterDictionary = results.flat();
        const total = masterDictionary.length;
        updateStatsText(total, 0, "");
        document.getElementById('results').innerHTML = '<div class="no-results" id="welcomeMsg">✨ Anadi ilelli – ssekcem awal ✨</div>';
        populateSourceSelect();
    }

    function populateSourceSelect() {
        const select = document.getElementById('sourceSelect');
        if (!select) return;
        const allOption = document.createElement('option');
        allOption.value = "all";
        allOption.id = "sourceAll";
        allOption.textContent = currentLang === "tm" ? "Merra" : "Tous";
        select.innerHTML = '';
        select.appendChild(allOption);
        SOURCES.forEach(src => {
            const option = document.createElement('option');
            option.value = src.id;
            option.textContent = currentLang === "tm" ? src.nom_tm : src.nom_fr;
            select.appendChild(option);
        });
    }

    function getSelectedSourceId() {
        return document.getElementById('sourceSelect').value;
    }

    // ======================= RECHERCHE =======================
    function matches(entry, lowerTerm, mode, lang) {
        if (mode === 'exact') {
            if (lang === 'french') return entry.french.toLowerCase() === lowerTerm;
            if (lang === 'tamazight') return entry.tamazight.some(tz => tz.toLowerCase() === lowerTerm);
            return entry.french.toLowerCase() === lowerTerm || entry.tamazight.some(tz => tz.toLowerCase() === lowerTerm);
        }
        if (mode === 'startsWith') {
            if (lang === 'french') return entry.french.toLowerCase().startsWith(lowerTerm);
            if (lang === 'tamazight') return entry.tamazight.some(tz => tz.toLowerCase().startsWith(lowerTerm));
            return entry.french.toLowerCase().startsWith(lowerTerm) || entry.tamazight.some(tz => tz.toLowerCase().startsWith(lowerTerm));
        }
        if (lang === 'french') return entry.french.toLowerCase().includes(lowerTerm);
        if (lang === 'tamazight') return entry.tamazight.some(tz => tz.toLowerCase().includes(lowerTerm));
        return entry.french.toLowerCase().includes(lowerTerm) || entry.tamazight.some(tz => tz.toLowerCase().includes(lowerTerm));
    }

    function searchFiltered(term) {
        if (!term || term.trim() === "") return [];
        const lowerTerm = term.trim().toLowerCase();
        const mode = document.getElementById('searchMode').value;
        const lang = document.getElementById('langFilter').value;
        const selectedSource = getSelectedSourceId();
        return masterDictionary.filter(entry => {
            if (selectedSource !== 'all' && entry.sourceId !== selectedSource) return false;
            return matches(entry, lowerTerm, mode, lang);
        });
    }

    // ======================= SUGGESTIONS =======================
    function updateSuggestions() {
        const term = document.getElementById('searchInput').value;
        const suggDiv = document.getElementById('suggestions');
        if (!term || term.trim().length < 2) {
            suggDiv.style.display = 'none';
            return;
        }
        const lowerTerm = term.trim().toLowerCase();
        const lang = document.getElementById('langFilter').value;
        const selectedSource = getSelectedSourceId();
        const matchesSet = new Set();
        for (let entry of masterDictionary) {
            if (selectedSource !== 'all' && entry.sourceId !== selectedSource) continue;
            if (lang === 'french' || lang === 'both') {
                if (entry.french.toLowerCase().startsWith(lowerTerm)) matchesSet.add(entry.french);
            }
            if (lang === 'tamazight' || lang === 'both') {
                for (let tz of entry.tamazight) {
                    if (tz.toLowerCase().startsWith(lowerTerm)) matchesSet.add(tz);
                }
            }
        }
        const suggestions = Array.from(matchesSet).slice(0, 10);
        if (suggestions.length === 0) {
            suggDiv.style.display = 'none';
            return;
        }
        suggDiv.innerHTML = suggestions.map(s => `<div class="sugg-item">${escapeHtml(s)}</div>`).join('');
        suggDiv.style.display = 'block';
        document.querySelectorAll('.sugg-item').forEach(item => {
            item.addEventListener('click', () => {
                document.getElementById('searchInput').value = item.innerText;
                suggDiv.style.display = 'none';
                performSearch();
            });
        });
    }

    // ======================= AFFICHAGE DES RÉSULTATS =======================
    function displayResults(results, searchTerm) {
        currentResults = results;
        currentSearchTerm = searchTerm;
        const resultsDiv = document.getElementById('results');
        if (results.length === 0) {
            resultsDiv.innerHTML = `<div class="no-results">${currentLang === "tm" ? `😞 Ulac agmuḍ i « ${escapeHtml(searchTerm)} »` : `😞 Aucun résultat pour « ${escapeHtml(searchTerm)} »`}</div>`;
            updateStatsText(masterDictionary.length, 0, searchTerm);
            return;
        }
        const grouped = new Map();
        for (const entry of results) {
            if (!grouped.has(entry.sourceId)) {
                grouped.set(entry.sourceId, {
                    sourceName: currentLang === "tm" ? entry.sourceName_tm : entry.sourceName_fr,
                    pdfUrl: entry.pdfUrl,
                    entries: []
                });
            }
            grouped.get(entry.sourceId).entries.push(entry);
        }
        let html = '';
        for (const group of grouped.values()) {
            const resultCount = group.entries.length;
            const headerText = currentLang === "tm" 
                ? `📌 ${group.sourceName} (${resultCount} ${resultCount === 1 ? "n ugmuḍ" : "n yigmaḍ"})`
                : `📌 ${group.sourceName} (${resultCount} résultat${resultCount > 1 ? "s" : ""})`;
            html += `
                <div class="source-group">
                    <div class="source-header">
                        <span class="source-name">${headerText}</span>
                        <a href="${group.pdfUrl}" target="_blank" rel="noopener noreferrer" class="btn-pdf-source" title="${currentLang === "tm" ? "Ldi afaylu-ines PDF" : "Ouvrir le PDF"}">
                            📄 ${currentLang === "tm" ? "Ldi afaylu PDF" : "Ouvrir le PDF"}
                        </a>
                    </div>
                    <div class="entries-list">
            `;
            for (const entry of group.entries) {
                let frenchDisplay = entry.french;
                let tamazightDisplay = entry.tamazight.join(' ; ');
                const regex = new RegExp(`(${escapeRegex(searchTerm)})`, 'gi');
                frenchDisplay = frenchDisplay.replace(regex, `<mark>$1</mark>`);
                tamazightDisplay = tamazightDisplay.replace(regex, `<mark>$1</mark>`);
                const variantsHtml = entry.tamazight.length > 1 
                    ? `<div class="variants">🔹 ${entry.tamazight.length} ${currentLang === "tm" ? "n tarrayin" : "variante(s)"} : ${entry.tamazight.join(' ; ')}</div>`
                    : '';
                html += `
                    <div class="entry-item">
                        <div class="french-word">📖 ${frenchDisplay}</div>
                        <div class="tamazight-word">ⵣ ${tamazightDisplay}</div>
                        ${variantsHtml}
                    </div>
                `;
            }
            html += `</div></div>`;
        }
        resultsDiv.innerHTML = html;
        updateStatsText(masterDictionary.length, results.length, searchTerm);
    }

    function updateStatsText(totalEntries, resultCount, searchTerm) {
        const statsDiv = document.getElementById('stats');
        const sourcesCount = SOURCES.length;
        let statsHtml = "";
        if (currentLang === "tm") {
            const sourcesText = sourcesCount === 1 ? "n uɣbalu" : "n yiɣbula";
            statsHtml = `📚 ${sourcesCount} ${sourcesText} | ${totalEntries} n wawalen`;
            if (searchTerm && searchTerm.trim() !== "") {
                if (resultCount === 0) {
                    statsHtml += ` | 🔍 0 n ugmuḍ`;
                } else {
                    statsHtml += ` | 🔍 ${resultCount} ${resultCount === 1 ? "n ugmuḍ" : "n yigmaḍ"} i « ${escapeHtml(searchTerm)} »`;
                }
            }
        } else {
            statsHtml = `📚 ${sourcesCount} source(s) | ${totalEntries} entrées`;
            if (searchTerm && searchTerm.trim() !== "") {
                statsHtml += ` | 🔍 ${resultCount} résultat${resultCount > 1 ? "s" : ""} pour « ${escapeHtml(searchTerm)} »`;
            }
        }
        statsDiv.innerHTML = statsHtml;
    }

    // ======================= INTERFACE LANGUE =======================
    function setLanguage(lang) {
        currentLang = lang;
        localStorage.setItem('appLang', lang);
        const header = document.getElementById('mainHeader');
        if (lang === 'fr') {
            header.classList.add('fr-mode');
        } else {
            header.classList.remove('fr-mode');
        }
        document.getElementById('subtitle').innerText = lang === "tm" ? "Amawal ameqran Tafransist >< Tamaziɣt" : "HYPERLEXIQUE. Grand dictionnaire français >< tamazight";
        document.getElementById('searchLabel').innerText = lang === "tm" ? "Ssekcem awal s tefransist neɣ s tmaziɣt" : "Saisissez un mot en français ou en tamazight";
        document.getElementById('searchInput').placeholder = lang === "tm" ? "Amedya : tagrawla, anmezruy, amgaru..." : "Ex. : révolution, guerre, dictionnaire...";
        document.getElementById('searchBtn').innerHTML = lang === "tm" ? "🔎 Nadi" : "🔎 Chercher";
        document.getElementById('modeLabel').innerText = lang === "tm" ? "Askar :" : "Mode :";
        document.getElementById('modeContains').innerText = lang === "tm" ? "Deg-s" : "Contient";
        document.getElementById('modeStartsWith').innerText = lang === "tm" ? "Ibeddu s" : "Commence par";
        document.getElementById('modeExact').innerText = lang === "tm" ? "Ufrin" : "Exact";
        document.getElementById('langLabel').innerText = lang === "tm" ? "Tutlayt :" : "Langue :";
        document.getElementById('langBoth').innerText = lang === "tm" ? "Deg snat" : "Les deux";
        document.getElementById('langFrench').innerText = lang === "tm" ? "Tafransist" : "Français";
        document.getElementById('langTamazight').innerText = lang === "tm" ? "Tamaziɣt" : "Tamazight";
        document.getElementById('sourceLabel').innerText = lang === "tm" ? "Amawal :" : "Lexique :";
        const sourceAllOpt = document.getElementById('sourceAll');
        if (sourceAllOpt) sourceAllOpt.textContent = lang === "tm" ? "Merra" : "Tous";
        const select = document.getElementById('sourceSelect');
        if (select) {
            for (let i = 0; i < select.options.length; i++) {
                const opt = select.options[i];
                if (opt.value === "all") continue;
                const src = SOURCES.find(s => s.id === opt.value);
                if (src) opt.textContent = lang === "tm" ? src.nom_tm : src.nom_fr;
            }
        }
        document.getElementById('footerText').innerText = lang === "tm" 
            ? "Iɣbula : Asnirem n umezruy – H.A.M. | Asuṭṭen n yiwalnuten – H.A.M. | Amawal n tsenselkimt – S.S.B. | Tazrawt n Doctorat – B.H. | Tazrawt n Doctorat – Y.DJ. | Taseftit n umyag – K.N.Z. | Amawal n tesnilest – A.B."
            : "Sources : Terminologie de l'histoire – H.A.M. | Inventaire des néologismes – H.A.M. | Lexique d'informatique – S.S.B. | Thèse de Doctorat – B.H. | Thèse de Doctorat – Y.DJ. | Conjugaison des verbes – K.N.Z. | Lexique de linguistique – A.B.";
        const welcomeDiv = document.getElementById('welcomeMsg');
        if (welcomeDiv) {
            welcomeDiv.innerText = lang === "tm" ? "✨ Anadi ilelli – ssekcem awal ✨" : "✨ Recherche libre – saisissez un mot ✨";
        }
        if (currentSearchTerm && currentSearchTerm.trim() !== "") {
            displayResults(currentResults, currentSearchTerm);
        } else if (masterDictionary.length > 0) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="no-results">${lang === "tm" ? "✨ Anadi ilelli – ssekcem awal ✨" : "✨ Recherche libre – saisissez un mot ✨"}</div>`;
            updateStatsText(masterDictionary.length, 0, "");
        }
    }

    // ======================= UTILITAIRES =======================
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    function escapeRegex(str) {
        return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function performSearch() {
        const term = document.getElementById('searchInput').value;
        if (!term.trim()) {
            document.getElementById('results').innerHTML = `<div class="no-results">${currentLang === "tm" ? "💇 Ssekcem awal i usuqel" : "💡 Saisissez un mot à traduire"}</div>`;
            updateStatsText(masterDictionary.length, 0, "");
            currentResults = [];
            currentSearchTerm = "";
            return;
        }
        const results = searchFiltered(term);
        displayResults(results, term);
    }

    function toggleFullscreen() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(e => console.warn(e));
        } else {
            document.exitFullscreen();
        }
    }

    function initDarkMode() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark-mode');
            document.body.classList.remove('light-mode');
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) icon.className = 'fas fa-sun';
        } else {
            document.body.classList.add('light-mode');
            document.body.classList.remove('dark-mode');
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) icon.className = 'fas fa-moon';
        }
    }

    function toggleDarkMode() {
        if (document.body.classList.contains('dark-mode')) {
            document.body.classList.remove('dark-mode');
            document.body.classList.add('light-mode');
            localStorage.setItem('theme', 'light');
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) icon.className = 'fas fa-moon';
        } else {
            document.body.classList.remove('light-mode');
            document.body.classList.add('dark-mode');
            localStorage.setItem('theme', 'dark');
            const icon = document.querySelector('#darkModeToggle i');
            if (icon) icon.className = 'fas fa-sun';
        }
    }

    // ======================= INITIALISATION =======================
    document.addEventListener('DOMContentLoaded', async () => {
        await loadAllSources();

        const savedLang = localStorage.getItem('appLang');
        if (savedLang === 'fr' || savedLang === 'tm') {
            setLanguage(savedLang);
        } else {
            setLanguage('tm');
        }

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const darkToggle = document.getElementById('darkModeToggle');
        const langToggle = document.getElementById('langToggle');
        const searchMode = document.getElementById('searchMode');
        const langFilter = document.getElementById('langFilter');
        const sourceSelect = document.getElementById('sourceSelect');

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') performSearch(); });
        searchInput.addEventListener('input', updateSuggestions);
        document.addEventListener('click', function(e) {
            const suggDiv = document.getElementById('suggestions');
            if (suggDiv && !suggDiv.contains(e.target) && e.target !== searchInput) {
                suggDiv.style.display = 'none';
            }
        });

        [searchMode, langFilter, sourceSelect].forEach(filter => {
            if (filter) filter.addEventListener('change', () => {
                if (searchInput.value.trim()) performSearch();
            });
        });

        if (fullscreenBtn) fullscreenBtn.addEventListener('click', (e) => { e.preventDefault(); toggleFullscreen(); });
        if (darkToggle) darkToggle.addEventListener('click', (e) => { e.preventDefault(); toggleDarkMode(); });
        if (langToggle) langToggle.addEventListener('click', (e) => {
            e.preventDefault();
            const newLang = currentLang === "tm" ? "fr" : "tm";
            setLanguage(newLang);
        });
        initDarkMode();
    });
</script>
</body>
</html>
